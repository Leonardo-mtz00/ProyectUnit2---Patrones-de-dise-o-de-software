<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Editor Colaborativo</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: #1e1e1e;
      color: #d4d4d4;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* --- Header --- */
    #header {
      background: #2d2d2d;
      padding: 10px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid #444;
    }

    #header h1 { font-size: 16px; color: #569cd6; }

    #status {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 13px;
    }

    #indicador {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #f44;
    }
    #indicador.conectado { background: #4ec9b0; }

    /* --- Layout principal --- */
    #main {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* --- Editor --- */
    #editor-container {
      flex: 1;
      display: flex;
      flex-direction: column;
    }

    #toolbar {
      background: #2d2d2d;
      padding: 6px 12px;
      display: flex;
      gap: 8px;
      border-bottom: 1px solid #444;
    }

    button {
      background: #3a3a3a;
      color: #d4d4d4;
      border: 1px solid #555;
      padding: 5px 12px;
      border-radius: 4px;
      cursor: pointer;
      font-size: 12px;
      transition: background 0.2s;
    }

    button:hover { background: #505050; }
    button.primary { background: #0e639c; border-color: #0e639c; }
    button.primary:hover { background: #1177bb; }

    #monaco-editor { flex: 1; }

    /* --- Panel lateral --- */
    #panel {
      width: 350px;
      background: #252526;
      border-left: 1px solid #444;
      display: flex;
      flex-direction: column;
    }

    #panel-tabs {
      display: flex;
      border-bottom: 1px solid #444;
    }

    .tab {
      flex: 1;
      padding: 8px;
      text-align: center;
      font-size: 12px;
      cursor: pointer;
      background: #2d2d2d;
      border: none;
      color: #888;
    }

    .tab.activa { color: #d4d4d4; border-bottom: 2px solid #569cd6; background: #252526; }

    #panel-content {
      flex: 1;
      overflow-y: auto;
      padding: 12px;
      font-size: 12px;
      line-height: 1.6;
    }

    /* --- Usuarios conectados --- */
    #usuarios-panel { padding: 12px; border-bottom: 1px solid #444; }
    #usuarios-panel h3 { font-size: 12px; color: #888; margin-bottom: 8px; }
    .usuario-chip {
      display: inline-block;
      background: #0e639c;
      color: white;
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 11px;
      margin: 2px;
    }

    /* --- Log de actividad --- */
    .log-entry {
      padding: 4px 0;
      border-bottom: 1px solid #333;
      color: #888;
      font-size: 11px;
    }
    .log-entry.ia { color: #4ec9b0; }
    .log-entry.edit { color: #569cd6; }
    .log-entry.error { color: #f44747; }

    #resultado-ia {
      white-space: pre-wrap;
      font-size: 11px;
      line-height: 1.7;
      color: #d4d4d4;
    }
  </style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>⚡ Editor Colaborativo — Patrones de Diseño</h1>
  <div id="status">
    <div id="indicador"></div>
    <span id="status-text">Desconectado</span>
    <span id="usuarios-count"></span>
  </div>
</div>

<!-- Main -->
<div id="main">

  <!-- Editor -->
  <div id="editor-container">
    <div id="toolbar">
      <input id="input-usuario" placeholder="Tu nombre de usuario" 
             style="background:#3a3a3a;border:1px solid #555;color:#d4d4d4;
                    padding:4px 8px;border-radius:4px;font-size:12px;width:150px"/>
      <button onclick="conectar()">🔌 Conectar</button>
      <button onclick="desconectar()">⛔ Desconectar</button>
      <span style="flex:1"></span>
      <button onclick="undo()">↩ Undo</button>
      <button onclick="redo()">↪ Redo</button>
      <button class="primary" onclick="analizarIA()">🤖 Analizar con IA</button>
    </div>
    <div id="monaco-editor"></div>
  </div>

  <!-- Panel lateral -->
  <div id="panel">
    <div id="usuarios-panel">
      <h3>👥 USUARIOS CONECTADOS</h3>
      <div id="usuarios-lista"></div>
    </div>

    <div id="panel-tabs">
      <button class="tab activa" onclick="mostrarTab('actividad')">Actividad</button>
      <button class="tab" onclick="mostrarTab('ia')">Resultado IA</button>
    </div>

    <div id="panel-content">
      <div id="tab-actividad"></div>
      <div id="tab-ia" style="display:none">
        <div id="resultado-ia">Presiona "Analizar con IA" para ver sugerencias...</div>
      </div>
    </div>
  </div>

</div>

<!-- Monaco Editor -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs/loader.min.js"></script>
<script>
  // ---------------------------------------------------------------------------
  // Monaco Editor
  // ---------------------------------------------------------------------------
  let editor;
  require.config({ paths: { vs: 'https://cdnjs.cloudflare.com/ajax/libs/monaco-editor/0.44.0/min/vs' } });
  require(['vs/editor/editor.main'], () => {
    editor = monaco.editor.create(document.getElementById('monaco-editor'), {
      value: `def suma(a, b):
    # Suma dos números
    return a + b

class Calculadora:
    def __init__(self):
        self.historial = []

    def operar(self, a, b):
        resultado = suma(a, b)
        print(resultado)
        return resultado
`,
      language: 'python',
      theme: 'vs-dark',
      fontSize: 14,
      minimap: { enabled: false },
      automaticLayout: true,
    });

    // Enviar cambios al servidor con debounce
    let timeout;
    editor.onDidChangeModelContent(() => {
      clearTimeout(timeout);
      timeout = setTimeout(() => {
        if (ws && ws.readyState === WebSocket.OPEN) {
          const pos = editor.getPosition();
          enviarMensaje({
            tipo: 'edicion',
            contenido: editor.getValue(),
            linea: pos ? pos.lineNumber : 0
          });
          agregarLog(`Edición enviada`, 'edit');
        }
      }, 500); // espera 500ms después de que el usuario deja de escribir
    });
  });

  // ---------------------------------------------------------------------------
  // WebSocket
  // ---------------------------------------------------------------------------
  let ws = null;
  let miUsuario = '';

  function conectar() {
    const nombre = document.getElementById('input-usuario').value.trim();
    if (!nombre) { alert('Escribe tu nombre de usuario'); return; }
    if (ws) ws.close();

    miUsuario = nombre;
    ws = new WebSocket(`ws://localhost:8000/ws/${nombre}`);

    ws.onopen = () => {
      document.getElementById('indicador').classList.add('conectado');
      document.getElementById('status-text').textContent = `Conectado como ${nombre}`;
      agregarLog(`Te conectaste como ${nombre}`, 'edit');
    };

    ws.onmessage = (event) => {
      const msg = JSON.parse(event.data);

      if (msg.tipo === 'actualizacion' && msg.de !== miUsuario) {
        // Actualizar editor con cambio de otro usuario
        const pos = editor.getPosition();
        editor.setValue(msg.contenido);
        editor.setPosition(pos);
        agregarLog(`${msg.de} editó el código`, 'edit');
      }

      else if (msg.tipo === 'usuario_conectado') {
        agregarLog(`${msg.usuario} se conectó (${msg.total} activos)`, 'edit');
        actualizarUsuarios(msg);
      }

      else if (msg.tipo === 'usuario_desconectado') {
        agregarLog(`${msg.usuario} se desconectó`, 'edit');
      }

      else if (msg.tipo === 'resultado_ia') {
        document.getElementById('resultado-ia').textContent = msg.resultado;
        mostrarTab('ia');
        agregarLog('Análisis de IA completado ✅', 'ia');
      }
    };

    ws.onerror = () => agregarLog('Error de conexión', 'error');
    ws.onclose = () => {
      document.getElementById('indicador').classList.remove('conectado');
      document.getElementById('status-text').textContent = 'Desconectado';
    };
  }

  function desconectar() {
    if (ws) { ws.close(); ws = null; }
  }

  function enviarMensaje(msg) {
    if (ws && ws.readyState === WebSocket.OPEN) {
      ws.send(JSON.stringify(msg));
    }
  }

  function undo() { enviarMensaje({ tipo: 'undo' }); }
  function redo() { enviarMensaje({ tipo: 'redo' }); }

  function analizarIA() {
    if (!ws) { alert('Conéctate primero'); return; }
    agregarLog('Enviando código a IA...', 'ia');
    enviarMensaje({ tipo: 'analizar_ia', contenido: editor.getValue() });
  }

  // ---------------------------------------------------------------------------
  // UI helpers
  // ---------------------------------------------------------------------------
  let usuarios = new Set();

  function actualizarUsuarios(msg) {
    if (msg.tipo === 'usuario_conectado') usuarios.add(msg.usuario);
    if (msg.tipo === 'usuario_desconectado') usuarios.delete(msg.usuario);
    const lista = document.getElementById('usuarios-lista');
    lista.innerHTML = [...usuarios].map(u =>
      `<span class="usuario-chip">👤 ${u}</span>`
    ).join('');
    document.getElementById('usuarios-count').textContent =
      `${usuarios.size} conectado${usuarios.size !== 1 ? 's' : ''}`;
  }

  function agregarLog(texto, tipo = '') {
    const div = document.getElementById('tab-actividad');
    const entry = document.createElement('div');
    entry.className = `log-entry ${tipo}`;
    entry.textContent = `${new Date().toLocaleTimeString()} — ${texto}`;
    div.prepend(entry);
  }

  function mostrarTab(tab) {
    document.getElementById('tab-actividad').style.display = tab === 'actividad' ? 'block' : 'none';
    document.getElementById('tab-ia').style.display = tab === 'ia' ? 'block' : 'none';
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('activa', (i === 0 && tab === 'actividad') || (i === 1 && tab === 'ia'));
    });
  }
</script>
</body>
</html>
